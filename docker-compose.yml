services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    restart: always

  backend:
    image: devashish13/taskmanager-backend:latest
    container_name: taskmanager-backend

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - CORS_ORIGIN=http://65.0.94.193

    restart: always

  frontend:
    image: devashish13/taskmanager-frontend:latest
    container_name: taskmanager-frontend

    ports:
      - "80:3000"

    environment:
      - NEXT_PUBLIC_API_URL=http://65.0.94.193:5000

    depends_on:
      - backend

    restart: always